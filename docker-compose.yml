services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_vue
    ports:
      - "3000:5173"
    depends_on:
      - backend
    networks:
      - microservicios_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_flask
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - microservicios_net
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: mongo_db
    env_file:
      - .env
    volumes:
      - mongo_data:/data/db
    networks:
      - microservicios_net
    restart: unless-stopped

  mongo-express:
    image: mongo-express:latest
    container_name: mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: Admin12345
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: Admin12345
    depends_on:
      - mongo
    networks:
      - microservicios_net
    restart: unless-stopped

networks:
  microservicios_net:
    driver: bridge

volumes:
  mongo_data: